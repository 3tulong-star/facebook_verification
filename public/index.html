<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Facebook Phone Checker</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f5f7;
      --panel: rgba(255, 255, 255, 0.86);
      --panel-strong: #fff;
      --text: #1d1d1f;
      --muted: #6e6e73;
      --line: rgba(0, 0, 0, 0.10);
      --blue: #0071e3;
      --blue-dark: #005bb5;
      --green: #248a3d;
      --red: #d70015;
      --amber: #a25b00;
      --shadow: 0 18px 46px rgba(0, 0, 0, 0.08);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Helvetica Neue", Arial, sans-serif;
      letter-spacing: 0;
    }

    button, input, select, textarea {
      font: inherit;
    }

    .app {
      width: min(1180px, calc(100% - 32px));
      margin: 0 auto;
      padding: 34px 0 46px;
    }

    .topbar {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 24px;
      margin-bottom: 24px;
    }

    h1 {
      margin: 0;
      font-size: clamp(34px, 5vw, 58px);
      line-height: 1.02;
      font-weight: 700;
    }

    .subtitle {
      margin: 10px 0 0;
      color: var(--muted);
      font-size: 17px;
    }

    .status-pill {
      display: inline-flex;
      align-items: center;
      min-height: 38px;
      padding: 8px 14px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.72);
      color: var(--muted);
      white-space: nowrap;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
    }

    .progress-panel {
      padding: 20px;
      margin-bottom: 16px;
    }

    .progress-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 14px;
    }

    .progress-title {
      font-size: 19px;
      font-weight: 650;
    }

    .progress-subtitle {
      margin-top: 4px;
      color: var(--muted);
      font-size: 13px;
    }

    .progress-percent {
      font-size: 24px;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
    }

    .progress-track {
      height: 12px;
      overflow: hidden;
      border-radius: 999px;
      background: #e8e8ed;
    }

    .progress-fill {
      width: 0%;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, #0071e3, #40a9ff);
      transition: width 240ms ease;
    }

    .metrics {
      display: grid;
      grid-template-columns: repeat(6, minmax(0, 1fr));
      gap: 12px;
      margin: 16px 0;
    }

    .metric {
      padding: 16px;
      min-height: 98px;
      background: var(--panel-strong);
      border: 1px solid var(--line);
      border-radius: 8px;
    }

    .metric-label {
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 8px;
    }

    .metric-value {
      font-size: 27px;
      line-height: 1;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      overflow-wrap: anywhere;
    }

    .metric-value.green { color: var(--green); }
    .metric-value.red { color: var(--red); }
    .metric-value.amber { color: var(--amber); }

    .workspace {
      display: grid;
      grid-template-columns: minmax(0, 1.25fr) minmax(320px, 0.75fr);
      gap: 16px;
      align-items: start;
    }

    .section {
      padding: 20px;
    }

    .section + .section {
      margin-top: 16px;
    }

    .section-title {
      margin: 0 0 14px;
      font-size: 19px;
      font-weight: 650;
    }

    .file-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 10px;
      align-items: center;
      margin-bottom: 12px;
    }

    .file-input {
      width: 100%;
      min-height: 44px;
      padding: 9px 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      color: var(--muted);
    }

    textarea {
      width: 100%;
      min-height: 230px;
      resize: vertical;
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      color: var(--text);
      line-height: 1.45;
      outline: none;
    }

    textarea:focus,
    input:focus,
    select:focus {
      border-color: rgba(0, 113, 227, 0.65);
      box-shadow: 0 0 0 4px rgba(0, 113, 227, 0.12);
    }

    .controls {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    label {
      display: block;
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 6px;
    }

    input[type="number"], select {
      width: 100%;
      height: 42px;
      padding: 0 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      color: var(--text);
      outline: none;
    }

    .actions {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      margin-top: 16px;
    }

    .btn {
      min-height: 44px;
      border: 0;
      border-radius: 8px;
      padding: 0 14px;
      cursor: pointer;
      font-weight: 650;
      transition: transform 140ms ease, background 140ms ease, opacity 140ms ease;
    }

    .btn:active { transform: scale(0.98); }

    .btn-primary {
      background: var(--blue);
      color: #fff;
    }

    .btn-primary:hover { background: var(--blue-dark); }

    .btn-secondary {
      background: #e8e8ed;
      color: var(--text);
    }

    .btn-secondary:hover { background: #dedee4; }

    .btn:disabled {
      cursor: not-allowed;
      opacity: 0.45;
      transform: none;
    }

    .note {
      margin-top: 12px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.5;
      overflow-wrap: anywhere;
    }

    .error {
      display: none;
      margin-top: 12px;
      padding: 12px;
      border: 1px solid rgba(215, 0, 21, 0.18);
      border-radius: 8px;
      background: rgba(255, 59, 48, 0.08);
      color: var(--red);
      white-space: pre-wrap;
      font-size: 13px;
    }

    @media (max-width: 960px) {
      .topbar { align-items: flex-start; flex-direction: column; }
      .metrics { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .workspace { grid-template-columns: 1fr; }
    }

    @media (max-width: 560px) {
      .app { width: min(100% - 20px, 1180px); padding-top: 22px; }
      .metrics { grid-template-columns: 1fr; }
      .controls, .actions, .file-row { grid-template-columns: 1fr; }
      .metric { min-height: 82px; }
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="topbar">
      <div>
        <h1>Facebook Checker</h1>
        <p class="subtitle">批量检测控制台</p>
      </div>
      <div id="statusPill" class="status-pill">待开始</div>
    </header>

    <section class="panel progress-panel">
      <div class="progress-head">
        <div>
          <div id="progressTitle" class="progress-title">准备就绪</div>
          <div id="progressDetail" class="progress-subtitle">0 / 0</div>
        </div>
        <div id="progressPercent" class="progress-percent">0%</div>
      </div>
      <div class="progress-track">
        <div id="progressFill" class="progress-fill"></div>
      </div>
    </section>

    <section class="metrics">
      <div class="metric">
        <div class="metric-label">总数</div>
        <div id="totalMetric" class="metric-value">0</div>
      </div>
      <div class="metric">
        <div class="metric-label">已处理</div>
        <div id="processedMetric" class="metric-value">0</div>
      </div>
      <div class="metric">
        <div class="metric-label">预计剩余</div>
        <div id="etaMetric" class="metric-value">--</div>
      </div>
      <div class="metric">
        <div class="metric-label">每分钟</div>
        <div id="rateMetric" class="metric-value">0</div>
      </div>
      <div class="metric">
        <div class="metric-label">有FB比例</div>
        <div id="hasRatioMetric" class="metric-value green">0%</div>
      </div>
      <div class="metric">
        <div class="metric-label">最近50有FB</div>
        <div id="recentRatioMetric" class="metric-value green">0%</div>
      </div>
    </section>

    <div class="workspace">
      <section class="panel section">
        <h2 class="section-title">输入</h2>
        <div class="file-row">
          <input id="excelFile" class="file-input" type="file" accept=".xlsx,.xls,.csv" />
          <button id="importBtn" class="btn btn-secondary" type="button">读取 Excel</button>
        </div>
        <div id="columnPickerWrap" style="display:none; margin-bottom:12px;">
          <label for="columnPicker">选择手机号列</label>
          <select id="columnPicker"></select>
        </div>
        <textarea id="phones" placeholder="8613812345678&#10;8615012345678"></textarea>
        <div id="inputNote" class="note">当前 0 条</div>
      </section>

      <aside>
        <section class="panel section">
          <h2 class="section-title">参数</h2>
          <div class="controls">
            <div>
              <label for="delayMs">单号间隔(ms)</label>
              <input id="delayMs" type="number" value="1500" min="300" max="10000" />
            </div>
            <div>
              <label for="concurrency">并发</label>
              <select id="concurrency">
                <option value="1">1</option>
                <option value="2">2</option>
                <option value="3">3</option>
                <option value="4" selected>4</option>
                <option value="5">5</option>
                <option value="6">6</option>
              </select>
            </div>
            <div>
              <label for="batchSize">每批数量</label>
              <input id="batchSize" type="number" value="80" min="10" max="200" />
            </div>
            <div>
              <label for="batchPauseMs">批次暂停(ms)</label>
              <input id="batchPauseMs" type="number" value="15000" min="0" max="120000" />
            </div>
          </div>
          <div class="actions">
            <button id="runBtn" class="btn btn-primary" type="button">开始</button>
            <button id="stopBtn" class="btn btn-secondary" type="button" disabled>停止监听</button>
          </div>
        </section>

        <section class="panel section">
          <h2 class="section-title">导出</h2>
          <div class="actions">
            <button id="exportBtn" class="btn btn-secondary" type="button" disabled>结果 Excel</button>
            <button id="logBtn" class="btn btn-secondary" type="button" disabled>运行日志</button>
          </div>
          <div id="summaryText" class="note">有FB 0 / 无FB 0 / 不确定 0 / 异常 0</div>
          <div id="logPath" class="note"></div>
        </section>
      </aside>
    </div>

    <pre id="errorBox" class="error"></pre>
  </main>

  <script>
    const runBtn = document.getElementById('runBtn');
    const stopBtn = document.getElementById('stopBtn');
    const exportBtn = document.getElementById('exportBtn');
    const logBtn = document.getElementById('logBtn');
    const importBtn = document.getElementById('importBtn');
    const excelFile = document.getElementById('excelFile');
    const columnPickerWrap = document.getElementById('columnPickerWrap');
    const columnPicker = document.getElementById('columnPicker');
    const phonesEl = document.getElementById('phones');
    const delayEl = document.getElementById('delayMs');
    const concurrencyEl = document.getElementById('concurrency');
    const batchSizeEl = document.getElementById('batchSize');
    const batchPauseEl = document.getElementById('batchPauseMs');
    const statusPill = document.getElementById('statusPill');
    const progressTitle = document.getElementById('progressTitle');
    const progressDetail = document.getElementById('progressDetail');
    const progressPercent = document.getElementById('progressPercent');
    const progressFill = document.getElementById('progressFill');
    const totalMetric = document.getElementById('totalMetric');
    const processedMetric = document.getElementById('processedMetric');
    const etaMetric = document.getElementById('etaMetric');
    const rateMetric = document.getElementById('rateMetric');
    const hasRatioMetric = document.getElementById('hasRatioMetric');
    const recentRatioMetric = document.getElementById('recentRatioMetric');
    const inputNote = document.getElementById('inputNote');
    const summaryText = document.getElementById('summaryText');
    const logPathEl = document.getElementById('logPath');
    const errorBox = document.getElementById('errorBox');

    let es = null;
    let rows = [];
    let currentJobId = null;
    let reconnectTimer = null;
    let userStopped = false;
    let startedAt = null;
    let autoRecheckStarted = false;
    let finalDone = false;
    let importedFileBase64 = '';

    function normalizeInputPhones() {
      return [...new Set(phonesEl.value.split(/\r?\n/).map(s => s.replace(/\D+/g, '')).filter(Boolean))];
    }

    function computeSummary() {
      return {
        total: rows.length,
        hasFb: rows.filter(r => r.status === 'HAS_FB').length,
        noFb: rows.filter(r => r.status === 'NO_FB').length,
        unknown: rows.filter(r => r.status === 'UNKNOWN').length,
        error: rows.filter(r => r.status === 'ERROR').length,
        needsRecheck: rows.filter(r => r.needsRecheck).length,
        lowConfidence: rows.filter(r => r.confidence === 'low').length,
      };
    }

    function formatDuration(ms) {
      if (!Number.isFinite(ms) || ms <= 0) return '--';
      const totalSeconds = Math.ceil(ms / 1000);
      const minutes = Math.floor(totalSeconds / 60);
      const seconds = totalSeconds % 60;
      if (minutes >= 60) {
        const hours = Math.floor(minutes / 60);
        const restMinutes = minutes % 60;
        return `${hours}h ${restMinutes}m`;
      }
      return minutes > 0 ? `${minutes}m ${seconds}s` : `${seconds}s`;
    }

    function percent(value, total) {
      if (!total) return '0%';
      return `${Math.round((value / total) * 100)}%`;
    }

    function setBusy(isBusy) {
      runBtn.disabled = isBusy;
      stopBtn.disabled = !isBusy;
      importBtn.disabled = isBusy;
      excelFile.disabled = isBusy;
      columnPicker.disabled = isBusy;
      phonesEl.disabled = isBusy;
      delayEl.disabled = isBusy;
      concurrencyEl.disabled = isBusy;
      batchSizeEl.disabled = isBusy;
      batchPauseEl.disabled = isBusy;
    }

    function updateInputCount() {
      inputNote.textContent = `当前 ${normalizeInputPhones().length} 条`;
    }

    function updateDashboard({ title = null, detail = null, totalOverride = null } = {}) {
      const inputTotal = totalOverride ?? normalizeInputPhones().length;
      const total = Math.max(inputTotal, rows.length);
      const processed = rows.length;
      const summary = computeSummary();
      const progress = total ? Math.min(100, Math.round((processed / total) * 100)) : 0;
      const elapsedMs = startedAt ? Date.now() - startedAt : 0;
      const perMinute = elapsedMs > 0 ? processed / (elapsedMs / 60000) : 0;
      const etaMs = perMinute > 0 && total > processed ? ((total - processed) / perMinute) * 60000 : 0;
      const recent = rows.slice(-50);
      const recentHas = recent.filter(r => r.status === 'HAS_FB').length;

      progressTitle.textContent = title || (finalDone ? '已完成' : currentJobId ? '运行中' : '准备就绪');
      progressDetail.textContent = detail || `${processed} / ${total}`;
      progressPercent.textContent = `${progress}%`;
      progressFill.style.width = `${progress}%`;

      totalMetric.textContent = total;
      processedMetric.textContent = processed;
      etaMetric.textContent = formatDuration(etaMs);
      rateMetric.textContent = perMinute ? perMinute.toFixed(1) : '0';
      hasRatioMetric.textContent = percent(summary.hasFb, processed);
      recentRatioMetric.textContent = percent(recentHas, recent.length);
      summaryText.textContent = `有FB ${summary.hasFb} / 无FB ${summary.noFb} / 不确定 ${summary.unknown} / 异常 ${summary.error} / 待复查 ${summary.needsRecheck}`;
      exportBtn.disabled = rows.length === 0;
      logBtn.disabled = !currentJobId;
    }

    function showError(message) {
      errorBox.style.display = 'block';
      errorBox.textContent = message;
    }

    function clearError() {
      errorBox.style.display = 'none';
      errorBox.textContent = '';
    }

    function cleanupStream() {
      if (es) { es.close(); es = null; }
      if (reconnectTimer) { clearTimeout(reconnectTimer); reconnectTimer = null; }
      setBusy(false);
    }

    async function fetchJobStatus() {
      if (!currentJobId) return null;
      const resp = await fetch(`/api/jobs/${currentJobId}`);
      if (!resp.ok) throw new Error('获取任务状态失败');
      return resp.json();
    }

    function upsertRow(result) {
      const idx = rows.findIndex(r => r.index === result.index);
      if (idx >= 0) rows[idx] = result; else rows.push(result);
      rows.sort((a, b) => a.index - b.index);
    }

    function scheduleReconnect() {
      if (userStopped || !currentJobId || reconnectTimer) return;
      reconnectTimer = setTimeout(async () => {
        reconnectTimer = null;
        try {
          const status = await fetchJobStatus();
          if (!status) return;
          if (status.status === 'done') {
            statusPill.textContent = '主任务完成';
            cleanupStream();
            await runAutoRecheck();
            return;
          }
          if (status.status === 'error') {
            showError(status.error || '任务失败');
            statusPill.textContent = '任务失败';
            cleanupStream();
            return;
          }
          statusPill.textContent = '自动重连';
          connectStream(currentJobId);
        } catch (e) {
          showError(`自动重连失败: ${e.message}`);
          statusPill.textContent = '重连失败';
          cleanupStream();
        }
      }, 3000);
    }

    function connectStream(jobId) {
      if (es) es.close();
      es = new EventSource(`/api/jobs/${jobId}/stream`);

      es.addEventListener('start', (e) => {
        const data = JSON.parse(e.data);
        statusPill.textContent = '检测中';
        logPathEl.textContent = data.logFile ? `日志: ${data.logFile}` : '';
        updateDashboard({ title: '检测中', detail: `${data.progress?.current || 0} / ${data.total}`, totalOverride: data.total });
      });

      es.addEventListener('batch', (e) => {
        const data = JSON.parse(e.data);
        statusPill.textContent = `批次 ${data.currentBatch}/${data.totalBatches}`;
        updateDashboard({ title: '检测中', detail: `${data.progress.current} / ${data.progress.total} · 批次 ${data.currentBatch}/${data.totalBatches}`, totalOverride: data.total });
      });

      es.addEventListener('pause', (e) => {
        const data = JSON.parse(e.data);
        statusPill.textContent = `暂停 ${Math.round((data.pauseMs || 0) / 1000)}s`;
        updateDashboard({ title: '批次暂停', detail: `${data.progress.current} / ${data.progress.total}`, totalOverride: data.total });
      });

      es.addEventListener('result', (e) => {
        const data = JSON.parse(e.data);
        upsertRow(data.result);
        statusPill.textContent = `${data.result.status}`;
        updateDashboard({ title: '检测中', detail: `${data.progress.current} / ${data.progress.total} · 批次 ${data.currentBatch}/${data.totalBatches}`, totalOverride: data.total });
      });

      es.addEventListener('ping', () => {
        statusPill.textContent = '连接正常';
      });

      es.addEventListener('done', async (e) => {
        const data = JSON.parse(e.data);
        rows = data.results || rows;
        updateDashboard({ title: '主任务完成', detail: `${data.progress.current} / ${data.progress.total}`, totalOverride: data.total });
        cleanupStream();
        await runAutoRecheck();
      });

      es.addEventListener('error', (e) => {
        let explicitError = null;
        try {
          if (e.data) explicitError = JSON.parse(e.data).error || null;
        } catch {}
        if (explicitError) {
          showError(explicitError);
          statusPill.textContent = '任务失败';
          cleanupStream();
          return;
        }
        statusPill.textContent = '连接断开';
        scheduleReconnect();
      });
    }

    async function runAutoRecheck() {
      if (autoRecheckStarted) return;
      autoRecheckStarted = true;
      const targets = rows.filter(r => r.needsRecheck || r.status === 'UNKNOWN' || r.status === 'ERROR').map(r => r.phone);
      if (!targets.length) {
        finalDone = true;
        statusPill.textContent = '已完成';
        updateDashboard({ title: '已完成', detail: `${rows.length} / ${rows.length}` });
        return;
      }

      setBusy(true);
      statusPill.textContent = '自动复查';
      updateDashboard({ title: '自动复查中', detail: `${targets.length} 条` });
      try {
        const resp = await fetch('/api/recheck', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            jobId: currentJobId,
            phones: targets.join('\n'),
            delayMs: Number(delayEl.value || 1500),
            concurrency: Number(concurrencyEl.value || 1)
          })
        });
        const data = await resp.json();
        if (!resp.ok) throw new Error(data.error || '复查失败');

        for (const updated of data.results) {
          const idx = rows.findIndex(r => r.phone === updated.phone);
          if (idx >= 0) rows[idx] = { ...rows[idx], ...updated, index: rows[idx].index };
        }
        rows.sort((a, b) => a.index - b.index);
        finalDone = true;
        statusPill.textContent = '已完成';
        updateDashboard({ title: '已完成', detail: `${rows.length} / ${rows.length}` });
      } catch (e) {
        showError(e.message);
        statusPill.textContent = '复查失败';
      } finally {
        setBusy(false);
        stopBtn.disabled = true;
      }
    }

    function readFileAsBase64(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onerror = () => reject(new Error('读取文件失败'));
        reader.onload = () => {
          const bytes = new Uint8Array(reader.result);
          let binary = '';
          const chunkSize = 0x8000;
          for (let i = 0; i < bytes.length; i += chunkSize) {
            binary += String.fromCharCode(...bytes.subarray(i, i + chunkSize));
          }
          resolve(btoa(binary));
        };
        reader.readAsArrayBuffer(file);
      });
    }

    async function downloadBlob(resp, filename) {
      const blob = await resp.blob();
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = filename;
      a.click();
      URL.revokeObjectURL(url);
    }

    function renderColumns(columns, selectedColumnIndex = 0) {
      columnPicker.innerHTML = '';
      for (const column of columns || []) {
        const option = document.createElement('option');
        option.value = String(column.index);
        option.textContent = `${column.label} (${column.normalizedCount} 条)`;
        columnPicker.appendChild(option);
      }
      columnPicker.value = String(selectedColumnIndex);
      columnPickerWrap.style.display = columns?.length ? 'block' : 'none';
    }

    async function importSelectedColumn(columnIndex = 0) {
      if (!importedFileBase64) throw new Error('请先选择文件');
      const resp = await fetch('/api/import.xlsx', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ fileBase64: importedFileBase64, columnIndex })
      });
      const data = await resp.json();
      if (!resp.ok) throw new Error(data.error || '导入失败');
      renderColumns(data.columns, data.selectedColumnIndex);
      phonesEl.value = data.phones.join('\n');
      inputNote.textContent = `当前 ${data.total} 条，已按 ${data.columns?.[data.selectedColumnIndex]?.name || 'A'} 列标准化为纯数字`;
      updateDashboard();
    }

    phonesEl.addEventListener('input', () => {
      updateInputCount();
      updateDashboard();
    });

    importBtn.addEventListener('click', async () => {
      const file = excelFile.files?.[0];
      if (!file) {
        showError('请选择文件');
        return;
      }
      clearError();
      importBtn.disabled = true;
      try {
        importedFileBase64 = await readFileAsBase64(file);
        await importSelectedColumn(0);
      } catch (e) {
        showError(e.message);
      } finally {
        importBtn.disabled = false;
      }
    });

    columnPicker.addEventListener('change', async () => {
      clearError();
      columnPicker.disabled = true;
      try {
        await importSelectedColumn(Number(columnPicker.value || 0));
      } catch (e) {
        showError(e.message);
      } finally {
        columnPicker.disabled = false;
      }
    });

    runBtn.addEventListener('click', async () => {
      const phones = normalizeInputPhones();
      const delayMs = Number(delayEl.value || 1500);
      const concurrency = Number(concurrencyEl.value || 1);
      const batchSize = Number(batchSizeEl.value || 80);
      const batchPauseMs = Number(batchPauseEl.value || 15000);
      if (!phones.length) {
        showError('请先输入号码');
        return;
      }
      phonesEl.value = phones.join('\n');
      updateInputCount();

      rows = [];
      currentJobId = null;
      userStopped = false;
      autoRecheckStarted = false;
      finalDone = false;
      startedAt = Date.now();
      logPathEl.textContent = '';
      clearError();
      setBusy(true);
      statusPill.textContent = '创建任务';
      updateDashboard({ title: '创建任务中', detail: `0 / ${phones.length}`, totalOverride: phones.length });

      try {
        const createResp = await fetch('/api/jobs', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ phones: phones.join('\n'), delayMs, concurrency, batchSize, batchPauseMs })
        });
        const createData = await createResp.json();
        if (!createResp.ok) throw new Error(createData.error || '创建任务失败');
        currentJobId = createData.jobId;
        logPathEl.textContent = createData.logFile ? `日志: ${createData.logFile}` : '';
        logBtn.disabled = false;
        connectStream(currentJobId);
      } catch (e) {
        showError(e.message);
        statusPill.textContent = '创建失败';
        cleanupStream();
      }
    });

    stopBtn.addEventListener('click', () => {
      userStopped = true;
      statusPill.textContent = '已停止监听';
      cleanupStream();
      updateDashboard({ title: '已停止监听' });
    });

    exportBtn.addEventListener('click', async () => {
      if (!rows.length) return;
      const resp = await fetch('/api/export.xlsx', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ results: rows })
      });
      if (!resp.ok) {
        showError('导出失败');
        return;
      }
      await downloadBlob(resp, 'facebook-check-results.xlsx');
    });

    logBtn.addEventListener('click', async () => {
      if (!currentJobId) return;
      const resp = await fetch(`/api/jobs/${currentJobId}/logs`);
      if (!resp.ok) {
        showError('日志导出失败');
        return;
      }
      await downloadBlob(resp, `facebook-check-${currentJobId}.jsonl`);
    });

    updateInputCount();
    updateDashboard();
  </script>
</body>
</html>
