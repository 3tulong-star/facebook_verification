<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Facebook Phone Checker</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 1180px; margin: 24px auto; padding: 0 16px; }
    textarea { width: 100%; height: 220px; }
    input, button, select { padding: 8px 12px; margin-right: 8px; margin-top: 6px; }
    table { width: 100%; border-collapse: collapse; margin-top: 16px; font-size: 14px; }
    th, td { border: 1px solid #ddd; padding: 8px; text-align: left; vertical-align: top; }
    th { background: #f5f5f5; }
    .HAS_FB { color: #0a7a2f; font-weight: bold; }
    .NO_FB { color: #b42318; font-weight: bold; }
    .UNKNOWN, .ERROR { color: #9a6700; font-weight: bold; }
    .muted { color: #666; }
    .toolbar { display:flex; flex-wrap:wrap; gap:8px; align-items:center; margin-top:12px; }
    .small { font-size:12px; color:#666; }
  </style>
</head>
<body>
  <h1>Facebook 手机号检测</h1>
  <p class="muted">支持分批执行：每批独立跑，批次间暂停，降低长任务后半段失真概率。</p>

  <div>
    <label>号码列表</label>
    <textarea id="phones" placeholder="8613812345678&#10;8615012345678"></textarea>
  </div>

  <div class="toolbar">
    <label>单号间隔(ms)</label>
    <input id="delayMs" type="number" value="1500" min="300" max="10000" />

    <label>并发</label>
    <select id="concurrency">
      <option value="1">1</option>
      <option value="2" selected>2</option>
      <option value="3">3</option>
      <option value="4">4</option>
    </select>

    <label>每批数量</label>
    <input id="batchSize" type="number" value="80" min="10" max="200" />

    <label>批次暂停(ms)</label>
    <input id="batchPauseMs" type="number" value="5000" min="0" max="120000" />

    <button id="runBtn">开始检测</button>
    <button id="stopBtn" disabled>停止监听</button>
    <button id="exportBtn" disabled>导出 Excel</button>
    <button id="recheckBtn" disabled>复查不确定</button>
  </div>

  <div id="status" style="margin-top:16px;"></div>
  <pre id="errorBox" style="margin-top:12px; white-space:pre-wrap; color:#b42318; background:#fff5f5; padding:12px; border:1px solid #f5c2c7; display:none;"></pre>
  <div id="summary" style="margin-top:12px;"></div>
  <div id="results"></div>

  <script>
    const runBtn = document.getElementById('runBtn');
    const stopBtn = document.getElementById('stopBtn');
    const exportBtn = document.getElementById('exportBtn');
    const recheckBtn = document.getElementById('recheckBtn');
    const phonesEl = document.getElementById('phones');
    const delayEl = document.getElementById('delayMs');
    const concurrencyEl = document.getElementById('concurrency');
    const batchSizeEl = document.getElementById('batchSize');
    const batchPauseEl = document.getElementById('batchPauseMs');
    const statusEl = document.getElementById('status');
    const summaryEl = document.getElementById('summary');
    const resultsEl = document.getElementById('results');
    const errorBox = document.getElementById('errorBox');

    let es = null;
    let rows = [];
    let currentJobId = null;
    let reconnectTimer = null;
    let userStopped = false;

    function computeSummary() {
      return {
        total: rows.length,
        hasFb: rows.filter(r => r.status === 'HAS_FB').length,
        noFb: rows.filter(r => r.status === 'NO_FB').length,
        unknown: rows.filter(r => r.status === 'UNKNOWN').length,
        error: rows.filter(r => r.status === 'ERROR').length,
      };
    }

    function renderSummary(summary, progressText = '') {
      summaryEl.innerHTML = `
        <strong>汇总</strong><br>
        ${progressText}<br>
        总数: ${summary.total} / 有FB: ${summary.hasFb} / 无FB: ${summary.noFb} / 待复查: ${summary.unknown} / 异常: ${summary.error}
      `;
      exportBtn.disabled = rows.length === 0;
      recheckBtn.disabled = !rows.some(r => r.status === 'UNKNOWN' || r.status === 'ERROR');
    }

    function renderTable() {
      const tableRows = rows.map(r => `
        <tr>
          <td>${r.index}</td>
          <td>${r.phone}</td>
          <td class="${r.status}">${r.status}</td>
          <td>
            ${r.reason || ''}
            <div class="small">rule: ${r.matchedRule || ''}</div>
            <div class="small">title: ${r.title || ''}</div>
            <div class="small">urlChanged: ${r.urlChanged ? 'true' : 'false'}</div>
            ${r.error ? `<div class="small">error: ${String(r.error).slice(0, 500)}</div>` : ''}
          </td>
          <td><div class="small">from: ${r.initialUrl || ''}</div><div>${r.finalUrl || ''}</div></td>
          <td>${r.visibleTextSnippet || ''}</td>
        </tr>
      `).join('');

      resultsEl.innerHTML = `
        <table>
          <thead>
            <tr>
              <th>#</th>
              <th>Phone</th>
              <th>Status</th>
              <th>Diagnosis</th>
              <th>URL</th>
              <th>Visible Text Snippet</th>
            </tr>
          </thead>
          <tbody>${tableRows}</tbody>
        </table>
      `;
    }

    function cleanupStream() {
      if (es) { es.close(); es = null; }
      if (reconnectTimer) { clearTimeout(reconnectTimer); reconnectTimer = null; }
      runBtn.disabled = false;
      stopBtn.disabled = true;
    }

    async function fetchJobStatus() {
      if (!currentJobId) return null;
      const resp = await fetch(`/api/jobs/${currentJobId}`);
      if (!resp.ok) throw new Error('获取任务状态失败');
      return resp.json();
    }

    function upsertRow(result) {
      const idx = rows.findIndex(r => r.index === result.index);
      if (idx >= 0) rows[idx] = result; else rows.push(result);
      rows.sort((a, b) => a.index - b.index);
    }

    function scheduleReconnect() {
      if (userStopped || !currentJobId || reconnectTimer) return;
      reconnectTimer = setTimeout(async () => {
        reconnectTimer = null;
        try {
          const status = await fetchJobStatus();
          if (!status) return;
          renderSummary(status.summary, `进度: ${status.progress.current} / ${status.progress.total} | 批次: ${status.currentBatch} / ${status.totalBatches}`);
          if (status.status === 'done') {
            statusEl.textContent = '任务已完成，自动恢复状态成功';
            cleanupStream();
            return;
          }
          if (status.status === 'error') {
            errorBox.style.display = 'block';
            errorBox.textContent = status.error || '任务失败，但未返回详细错误';
            statusEl.textContent = '任务失败';
            cleanupStream();
            return;
          }
          statusEl.textContent = '流断开，任务仍在运行，正在自动重连...';
          connectStream(currentJobId);
        } catch (e) {
          errorBox.style.display = 'block';
          errorBox.textContent = `自动重连失败: ${e.message}`;
          statusEl.textContent = '自动重连失败';
          cleanupStream();
        }
      }, 3000);
    }

    function connectStream(jobId) {
      if (es) es.close();
      es = new EventSource(`/api/jobs/${jobId}/stream`);

      es.addEventListener('start', (e) => {
        const data = JSON.parse(e.data);
        statusEl.textContent = `检测中，总数 ${data.total}，并发 ${data.concurrency}，jobId=${data.jobId}`;
        renderSummary(data.summary || { total: 0, hasFb: 0, noFb: 0, unknown: 0, error: 0 }, `进度: ${data.progress?.current || 0} / ${data.progress?.total || data.total} | 批次: ${data.currentBatch || 0} / ${data.totalBatches || 0}`);
      });

      es.addEventListener('batch', (e) => {
        const data = JSON.parse(e.data);
        statusEl.textContent = data.message || `批次 ${data.batchIndex}/${data.batchCount}`;
        renderSummary(data.summary, `进度: ${data.progress.current} / ${data.progress.total} | 批次: ${data.currentBatch} / ${data.totalBatches}`);
      });

      es.addEventListener('pause', (e) => {
        const data = JSON.parse(e.data);
        statusEl.textContent = data.message || `批次暂停 ${data.pauseMs}ms`;
      });

      es.addEventListener('result', (e) => {
        const data = JSON.parse(e.data);
        upsertRow(data.result);
        renderSummary(data.summary, `进度: ${data.progress.current} / ${data.progress.total} | 批次: ${data.currentBatch} / ${data.totalBatches}`);
        renderTable();
        statusEl.textContent = `检测中，最新: ${data.result.phone} -> ${data.result.status}`;
      });

      es.addEventListener('ping', () => {
        statusEl.textContent = '检测中（连接保活中）';
      });

      es.addEventListener('done', (e) => {
        const data = JSON.parse(e.data);
        rows = data.results || rows;
        renderSummary(data.summary, `进度: ${data.progress.current} / ${data.progress.total} | 批次: ${data.currentBatch} / ${data.totalBatches}`);
        renderTable();
        statusEl.textContent = '检测完成';
        cleanupStream();
      });

      es.addEventListener('error', (e) => {
        let explicitError = null;
        try {
          if (e.data) {
            const data = JSON.parse(e.data);
            explicitError = data.error || null;
          }
        } catch {}
        if (explicitError) {
          errorBox.style.display = 'block';
          errorBox.textContent = explicitError;
          statusEl.textContent = '任务失败';
          cleanupStream();
          return;
        }
        errorBox.style.display = 'block';
        errorBox.textContent = 'SSE 连接断开。正在查询任务状态并尝试自动重连；如果任务仍在跑，会继续接上。';
        scheduleReconnect();
      });
    }

    runBtn.addEventListener('click', async () => {
      const phones = phonesEl.value.trim();
      const delayMs = Number(delayEl.value || 1500);
      const concurrency = Number(concurrencyEl.value || 1);
      const batchSize = Number(batchSizeEl.value || 80);
      const batchPauseMs = Number(batchPauseEl.value || 5000);
      if (!phones) {
        alert('请先输入号码');
        return;
      }

      rows = [];
      currentJobId = null;
      userStopped = false;
      resultsEl.innerHTML = '';
      summaryEl.innerHTML = '';
      errorBox.style.display = 'none';
      errorBox.textContent = '';
      statusEl.textContent = '创建任务中...';
      exportBtn.disabled = true;
      recheckBtn.disabled = true;
      runBtn.disabled = true;
      stopBtn.disabled = false;

      try {
        const createResp = await fetch('/api/jobs', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ phones, delayMs, concurrency, batchSize, batchPauseMs })
        });
        const createData = await createResp.json();
        if (!createResp.ok) throw new Error(createData.error || '创建任务失败');
        currentJobId = createData.jobId;
        statusEl.textContent = `任务已创建，jobId=${currentJobId}`;
        connectStream(currentJobId);
      } catch (e) {
        errorBox.style.display = 'block';
        errorBox.textContent = e.message;
        statusEl.textContent = '创建任务失败';
        cleanupStream();
      }
    });

    stopBtn.addEventListener('click', () => {
      userStopped = true;
      statusEl.textContent = '已手动停止监听';
      cleanupStream();
    });

    exportBtn.addEventListener('click', async () => {
      if (!rows.length) return;
      const resp = await fetch('/api/export.xlsx', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ results: rows })
      });
      if (!resp.ok) { alert('导出失败'); return; }
      const blob = await resp.blob();
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'facebook-check-results.xlsx';
      a.click();
      URL.revokeObjectURL(url);
    });

    recheckBtn.addEventListener('click', async () => {
      const targets = rows.filter(r => r.status === 'UNKNOWN' || r.status === 'ERROR').map(r => r.phone);
      if (!targets.length) { alert('没有待复查号码'); return; }
      statusEl.textContent = `复查中，共 ${targets.length} 个`;
      errorBox.style.display = 'none';
      errorBox.textContent = '';

      const resp = await fetch('/api/recheck', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ phones: targets.join('\n'), delayMs: Number(delayEl.value || 1500), concurrency: Number(concurrencyEl.value || 1) })
      });

      const data = await resp.json();
      if (!resp.ok) {
        errorBox.style.display = 'block';
        errorBox.textContent = data.error || '复查失败';
        statusEl.textContent = '复查失败';
        return;
      }

      for (const updated of data.results) {
        const idx = rows.findIndex(r => r.phone === updated.phone);
        if (idx >= 0) rows[idx] = { ...rows[idx], ...updated };
      }
      rows.sort((a, b) => a.index - b.index);
      renderSummary(computeSummary(), '复查完成');
      renderTable();
      statusEl.textContent = '复查完成';
    });
  </script>
</body>
</html>
