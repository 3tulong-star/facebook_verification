<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Facebook Phone Checker</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 1100px; margin: 24px auto; padding: 0 16px; }
    textarea { width: 100%; height: 240px; }
    input, button { padding: 8px 12px; margin-right: 8px; }
    table { width: 100%; border-collapse: collapse; margin-top: 16px; font-size: 14px; }
    th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
    th { background: #f5f5f5; }
    .HAS_FB { color: #0a7a2f; font-weight: bold; }
    .NO_FB { color: #b42318; font-weight: bold; }
    .UNKNOWN, .ERROR { color: #9a6700; font-weight: bold; }
    .muted { color: #666; }
  </style>
</head>
<body>
  <h1>Facebook 手机号检测</h1>
  <p class="muted">一行一个号码。使用 SSE 实时返回结果，边跑边显示。</p>

  <div>
    <label>号码列表</label>
    <textarea id="phones" placeholder="8613812345678&#10;8615012345678"></textarea>
  </div>

  <div style="margin-top: 12px;">
    <label>间隔(ms)</label>
    <input id="delayMs" type="number" value="2000" min="500" max="10000" />
    <button id="runBtn">开始检测</button>
    <button id="stopBtn" disabled>停止</button>
  </div>

  <div id="status" style="margin-top: 16px;"></div>
  <div id="summary" style="margin-top: 12px;"></div>
  <div id="results"></div>

  <script>
    const runBtn = document.getElementById('runBtn');
    const stopBtn = document.getElementById('stopBtn');
    const phonesEl = document.getElementById('phones');
    const delayEl = document.getElementById('delayMs');
    const statusEl = document.getElementById('status');
    const summaryEl = document.getElementById('summary');
    const resultsEl = document.getElementById('results');

    let es = null;
    let rows = [];

    function renderSummary(summary, progressText = '') {
      summaryEl.innerHTML = `
        <strong>汇总</strong><br>
        ${progressText}<br>
        总数: ${summary.total} / 有FB: ${summary.hasFb} / 无FB: ${summary.noFb} / 待复查: ${summary.unknown} / 异常: ${summary.error}
      `;
    }

    function renderTable() {
      const tableRows = rows.map(r => `
        <tr>
          <td>${r.index}</td>
          <td>${r.phone}</td>
          <td class="${r.status}">${r.status}</td>
          <td>${r.reason || ''}</td>
          <td>${r.finalUrl || ''}</td>
        </tr>
      `).join('');

      resultsEl.innerHTML = `
        <table>
          <thead>
            <tr>
              <th>#</th>
              <th>Phone</th>
              <th>Status</th>
              <th>Reason</th>
              <th>Final URL</th>
            </tr>
          </thead>
          <tbody>${tableRows}</tbody>
        </table>
      `;
    }

    function cleanupStream() {
      if (es) {
        es.close();
        es = null;
      }
      runBtn.disabled = false;
      stopBtn.disabled = true;
    }

    runBtn.addEventListener('click', async () => {
      const phones = phonesEl.value.trim();
      const delayMs = Number(delayEl.value || 2000);
      if (!phones) {
        alert('请先输入号码');
        return;
      }

      rows = [];
      resultsEl.innerHTML = '';
      summaryEl.innerHTML = '';
      statusEl.textContent = '准备开始...';
      runBtn.disabled = true;
      stopBtn.disabled = false;

      const params = new URLSearchParams({ phones, delayMs: String(delayMs) });
      es = new EventSource(`/api/check-stream?${params.toString()}`);

      es.addEventListener('start', (e) => {
        const data = JSON.parse(e.data);
        statusEl.textContent = `检测中，总数 ${data.total}`;
        renderSummary({ total: 0, hasFb: 0, noFb: 0, unknown: 0, error: 0 }, `进度: 0 / ${data.total}`);
      });

      es.addEventListener('result', (e) => {
        const data = JSON.parse(e.data);
        rows.push(data.result);
        renderSummary(data.summary, `进度: ${rows.length}`);
        renderTable();
        statusEl.textContent = `检测中，最新: ${data.result.phone} -> ${data.result.status}`;
      });

      es.addEventListener('done', (e) => {
        const data = JSON.parse(e.data);
        renderSummary(data.summary, `进度: ${data.results.length} / ${data.results.length}`);
        statusEl.textContent = '检测完成';
        cleanupStream();
      });

      es.addEventListener('error', (e) => {
        statusEl.textContent = '流式检测异常或连接结束';
        cleanupStream();
      });
    });

    stopBtn.addEventListener('click', () => {
      statusEl.textContent = '已手动停止';
      cleanupStream();
    });
  </script>
</body>
</html>
